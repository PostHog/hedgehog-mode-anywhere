<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hedgehog Mode</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 520px;
      padding: 20px;
      background: #1d1f27;
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .link-icon {
      width: 16px;
      height: 16px;
      opacity: 0.5;
      cursor: pointer;
    }

    .link-icon:hover {
      opacity: 0.8;
    }

    .top-toggles {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #2c2f3e;
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
    }

    .toggle-pill:hover {
      background: #3c4152;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #4b5167;
      transition: 0.3s;
      border-radius: 20px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background-color: #d4a019;
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }

    .preview-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      background: #2c2f3e;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .preview-hedgehog {
      width: 80px;
      height: 80px;
      position: relative;
      flex-shrink: 0;
    }

    .preview-hedgehog .sprite {
      width: 80px;
      height: 80px;
      background-size: 800%;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
    }

    .preview-hedgehog .accessory {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
    }

    .preview-text h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .preview-text p {
      font-size: 13px;
      color: #9ba0b0;
      line-height: 1.5;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }

    .options-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .option-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #2c2f3e;
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
    }

    .option-toggle:hover {
      background: #3c4152;
    }

    .option-toggle .toggle {
      width: 32px;
      height: 18px;
    }

    .option-toggle .toggle-slider:before {
      height: 12px;
      width: 12px;
    }

    .option-toggle .toggle input:checked + .toggle-slider:before {
      transform: translateX(14px);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .preview-btn {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid transparent;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .preview-btn:hover {
      background: #3c4152;
    }

    .preview-btn:focus-visible {
      outline: 2px solid #d4a019;
      outline-offset: 2px;
    }

    .preview-btn.active {
      border-color: #d4a019;
    }

    .preview-btn .sprite-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .preview-btn .sprite {
      width: 100%;
      height: 100%;
      background-size: 800%;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
    }

    .preview-btn .accessory {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
      object-fit: contain;
    }

    .footer {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid #3c4152;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
    }

    .footer a {
      color: #d4a019;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Hedgehog mode</h1>
  </div>

  <div class="top-toggles">
    <label class="toggle-pill">
      <span>Enabled hedgehog mode</span>
      <span class="toggle">
        <input type="checkbox" id="enableToggle" aria-label="Enable hedgehog mode">
        <span class="toggle-slider"></span>
      </span>
    </label>
    <label class="toggle-pill">
      <span id="siteToggleLabel">Disable on this site</span>
      <span class="toggle">
        <input type="checkbox" id="siteToggle" aria-label="Disable on this site">
        <span class="toggle-slider"></span>
      </span>
    </label>
  </div>

  <div class="preview-card">
    <div class="preview-hedgehog" id="previewHedgehog">
      <div class="sprite" id="previewSprite"></div>
    </div>
    <div class="preview-text">
      <h2>Hi, I'm Max!</h2>
      <p>Don't mind me. I'm just here to keep you company.<br>
      You can move me around by clicking and dragging or control me with WASD / arrow keys.</p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Options</div>
    <div class="options-toggles">
      <label class="option-toggle">
        <span>Walk around freely</span>
        <span class="toggle">
          <input type="checkbox" id="walkingEnabled" checked aria-label="Walk around freely">
          <span class="toggle-slider"></span>
        </span>
      </label>
      <label class="option-toggle">
        <span>Interact with elements</span>
        <span class="toggle">
          <input type="checkbox" id="interactionsEnabled" checked aria-label="Interact with elements">
          <span class="toggle-slider"></span>
        </span>
      </label>
      <label class="option-toggle">
        <span>Keyboard controls (WASD / arrow keys)</span>
        <span class="toggle">
          <input type="checkbox" id="controlsEnabled" checked aria-label="Keyboard controls">
          <span class="toggle-slider"></span>
        </span>
      </label>
      <label class="option-toggle">
        <span>Sound effects</span>
        <span class="toggle">
          <input type="checkbox" id="soundEnabled" aria-label="Sound effects">
          <span class="toggle-slider"></span>
        </span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Skins and colors</div>
    <div class="preview-grid" id="skinsGrid" role="group" aria-label="Skins and colors"></div>
  </div>

  <div class="section">
    <div class="section-title">Headwear</div>
    <div class="preview-grid" id="headwearGrid" role="group" aria-label="Headwear"></div>
  </div>

  <div class="section">
    <div class="section-title">Eyewear</div>
    <div class="preview-grid" id="eyewearGrid" role="group" aria-label="Eyewear"></div>
  </div>

  <div class="section">
    <div class="section-title">Other</div>
    <div class="preview-grid" id="otherGrid" role="group" aria-label="Other accessories"></div>
  </div>

  <div class="footer">
    Made with love by <a href="https://posthog.com" target="_blank">PostHog</a>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
